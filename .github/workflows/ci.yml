name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validation:
    name: Validation gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format
        run: nix develop . --command cargo fmt --all --check

      - name: Check workspace
        run: nix develop . --command cargo check --workspace --all-targets

      - name: Test workspace
        run: nix develop . --command cargo test --workspace

      - name: Strict Clippy
        run: >
          nix develop . --command cargo clippy --workspace --all-targets --
          -W clippy::pedantic
          -W clippy::nursery
          -W clippy::perf
          -W clippy::redundant_clone

      - name: Metadata benchmark compile
        run: nix develop . --command cargo bench -p pureflow-core --bench metadata_overhead --no-run

      - name: Backpressure benchmark compile
        run: nix develop . --command cargo bench -p pureflow-engine --bench backpressure_capacity --no-run

      - name: Dylint local lint pass
        run: |
          if compgen -G "/home/ben/code/highland-labs-lints/lints/*" > /dev/null; then
            nix develop . --command cargo-dylint-nightly --all
          else
            echo "::notice::Skipping Dylint because local lint packages are not present on this runner."
          fi

      - name: Diff whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^..HEAD
          else
            git diff --check
          fi
